name: 外骨骼资讯定时推送
on:
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 13 * * *'
  workflow_dispatch:
jobs:
  push-exoskeleton-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Restore push history cache
        uses: actions/cache@v4
        with:
          path: pushed_history.json
          key: exoskeleton-push-history-${{ github.run_id }}
          restore-keys: |
            exoskeleton-push-history-
      - name: Run push script
        env:
          WECHAT_WEBHOOK_KEY: ${{ secrets.WECHAT_WEBHOOK_KEY }}
          TIANAPI_KEY: ${{ secrets.TIANAPI_KEY }}
          BILIBILI_COOKIE: ${{ secrets.BILIBILI_COOKIE }}
        run: python exoskeleton_bot.py
